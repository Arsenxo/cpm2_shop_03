<!DOCTYPE html>
<html lang="ru">

<head>
<meta charset="UTF-8">
<title>CPM2 Market</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>

<h1>CPM2 ACCOUNT MARKET 👑</h1>

<nav>
<a href="#">Главная</a>
<a href="#shop">Магазин</a>
<a href="#cart">Корзина</a>
<a href="orders.html">Заказы</a>
<a href="login.html">Вход</a>
</nav>

</header>

<section class="hero">

<h2>Аккаунты Car Parking Multiplayer 2</h2>
<p>KING ранг • 50M денег • 300 коинов</p>

<button onclick="scrollShop()">Открыть магазин</button>

</section>

<section id="shop">

<h2>Аккаунты</h2>

<input id="search" placeholder="Поиск..." onkeyup="searchProduct()">

<div class="products" id="products"></div>

</section>

<section id="cart">

<h2>Корзина</h2>

<div id="cartItems"></div>

<button onclick="checkout()">Купить</button>

</section>

<section id="chat">

<h2>Чат поддержки</h2>

<div id="messages"></div>

<input id="messageInput" placeholder="Сообщение">
<button onclick="sendMessage()">Отправить</button>

</section>

<footer>

<p>© CPM2 Market 2026</p>

</footer>

<script src="shop.js"></script>
<script src="chat.js"></script>

</body>
</html>
